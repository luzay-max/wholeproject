name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lost-and-found  2.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven Tests
        run: chmod +x mvnw && ./mvnw -B test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: multi-window-vue - 2.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "multi-window-vue - 2.1/package-lock.json"

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

